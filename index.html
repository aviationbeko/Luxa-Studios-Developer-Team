<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LSDT - Cloud Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #6c5ce7; --bg: #0f051d; --card: rgba(255,255,255,0.05); --text: #fff; --danger: #ff7675; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; flex-direction: column; }
        
        #loading-screen { justify-content: center; align-items: center; z-index: 1000; }
        .cube { width: 50px; height: 50px; background: var(--primary); border-radius: 12px; animation: rotate 2s infinite ease-in-out; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(180deg) scale(1.2); } 100% { transform: rotate(360deg); } }

        .login-card { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center; margin: auto; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.1); border: 1px solid transparent; border-radius: 15px; color: #fff; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 15px; color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(108,92,231,0.3); }
        .btn-danger { width: 100%; padding: 15px; background: var(--danger); border: none; border-radius: 15px; color: #fff; font-weight: 700; cursor: pointer; }

        .top-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); }
        .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { opacity: 0.5; cursor: pointer; text-align: center; font-size: 0.8rem; }
        .nav-item.active { opacity: 1; color: var(--primary); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 4px; }

        #page-container { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 90px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .tag { display: inline-block; padding: 4px 10px; background: rgba(108,92,231,0.2); color: var(--primary); border-radius: 8px; font-size: 0.7rem; font-weight: 700; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; padding: 30px; border-radius: 25px; width: 90%; max-width: 450px; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; }
        .toast { background: var(--primary); padding: 12px 25px; border-radius: 50px; margin-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .preview-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="loading-screen" class="screen active">
        <div style="text-align:center;">
            <div class="cube"></div>
            <h1 style="margin-top:20px;">LSDT</h1>
        </div>
    </div>

    <div id="login-screen" class="screen">
        <div class="login-card">
            <h1 style="font-size:2.5rem; margin-bottom:10px;">LSDT</h1>
            <p style="color:#aaa; margin-bottom:30px;">Developer Management</p>
            <form id="login-form">
                <input type="text" id="username" placeholder="Kullanıcı Adı" required>
                <input type="password" id="password" placeholder="Şifre" required>
                <button type="submit" class="btn-primary">GİRİŞ YAP</button>
            </form>
        </div>
    </div>

    <div id="main-app-screen" class="screen">
        <nav class="top-nav">
            <div style="display:flex; gap:10px; align-items:center;">
                <div id="user-avatar" class="avatar">L</div>
                <div>
                    <div id="nav-user-name" style="font-weight:700;">Yükleniyor...</div>
                    <div id="nav-user-rank" style="font-size:0.7rem; color:#aaa;">Rank</div>
                </div>
            </div>
            <div style="font-weight:700; color:var(--primary);"><i class="fas fa-bolt"></i> <span id="user-points">0</span> XP</div>
        </nav>
        <main id="page-container"></main>
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchPage('dashboard')"><i class="fas fa-home"></i>Panel</div>
            <div class="nav-item" onclick="switchPage('tasks')"><i class="fas fa-list"></i>Görevler</div>
            <div class="nav-item" onclick="switchPage('announcements')"><i class="fas fa-bell"></i>Duyurular</div>
            <div class="nav-item" onclick="switchPage('settings')"><i class="fas fa-user"></i>Profil</div>
        </nav>
    </div>

    <div id="create-dev-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Üye Ekle</h3><i class="fas fa-times close-modal" style="cursor:pointer;"></i></div>
            <form id="create-dev-form">
                <input type="text" id="new-dev-name" placeholder="Ad Soyad" required>
                <input type="text" id="new-dev-username" placeholder="Kullanıcı Adı" required>
                <input type="password" id="new-dev-password" placeholder="Şifre" required>
                <select id="new-dev-category">
                    <option value="Script">Script</option>
                    <option value="Modelleme">Modelleme</option>
                    <option value="UI Tasarım">UI Tasarım</option>
                </select>
                <button type="submit" class="btn-primary">KAYDET</button>
            </form>
        </div>
    </div>

    <div id="assign-task-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Görev Ver</h3><i class="fas fa-times close-modal" style="cursor:pointer;"></i></div>
            <form id="assign-task-form">
                <select id="task-assignee" required></select>
                <input type="text" id="task-title" placeholder="Başlık" required>
                <textarea id="task-desc" placeholder="Detaylar" required></textarea>
                <select id="task-type"><option value="Günlük">Günlük</option><option value="Haftalık">Haftalık</option></select>
                <select id="task-priority"><option value="low">Düşük</option><option value="medium">Orta</option><option value="high">Yüksek</option></select>
                <button type="submit" class="btn-primary">GÖNDER</button>
            </form>
        </div>
    </div>

    <div id="announcement-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Duyuru</h3><i class="fas fa-times close-modal" style="cursor:pointer;"></i></div>
            <form id="announcement-form">
                <input type="text" id="ann-title" placeholder="Başlık" required>
                <textarea id="announcement-text" placeholder="Mesaj" required></textarea>
                <button type="submit" class="btn-primary">YAYINLA</button>
            </form>
        </div>
    </div>

    <div id="complete-task-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Raporla</h3><i class="fas fa-times close-modal" style="cursor:pointer;"></i></div>
            <form id="complete-task-form">
                <textarea id="task-report" placeholder="Neler yaptın?" required></textarea>
                <textarea id="task-bugs" placeholder="Hatalar"></textarea>
                <input type="file" id="task-images" multiple accept="image/*">
                <div id="image-preview-container" class="preview-grid"></div>
                <button type="submit" class="btn-primary">GÖNDER</button>
            </form>
        </div>
    </div>

    <div id="reject-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Reddet</h3><i class="fas fa-times close-modal" style="cursor:pointer;"></i></div>
            <form id="reject-form">
                <textarea id="reject-reason" placeholder="Sebep" required></textarea>
                <button type="submit" class="btn-danger">REDDET</button>
            </form>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
