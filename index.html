<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png" />
    <link rel="shortcut icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LSDT v11.0 Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { 
            --p: #a29bfe; --p-dark: #6c5ce7;
            --bg: radial-gradient(circle at top right, #2d1454, #0f051d); 
            --bg-dark: #0f051d;
            --card: rgba(255, 255, 255, 0.03); 
            --text: #ffffff; --sub: #d1d8e0; 
            --red: #ff7675; --green: #55efc4; --gold: #f1c40f;
            --glass: rgba(162, 155, 254, 0.15);
            --p-grad: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --gold-grad: linear-gradient(135deg, #f1c40f, #e67e22);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; background: var(--bg); }
        .screen.active { display: flex !important; }

        /* LOADING */
        #loading-screen { justify-content: center; align-items: center; z-index: 9999; background: #05020a; }
        .load-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; width: 100%; }
        #l-cube { width: 40px; height: 40px; background: var(--p-grad); border-radius: 12px; box-shadow: 0 0 40px rgba(108,92,231,0.8); position: absolute; }
        #l-code { font-family: monospace; color: var(--green); font-size: 1.2rem; font-weight: 600; opacity: 0; white-space: nowrap; overflow: hidden; position: absolute; }
        #l-text { font-size: 4.5rem; font-weight: 900; background: var(--p-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0; position: absolute; letter-spacing: 5px; }

        /* UI ELEMENTS */
        .glass-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.15); padding: 40px 30px; border-radius: 45px; width: 92%; max-width: 400px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        .input-p { width: 100%; padding: 18px; margin-bottom: 15px; background: rgba(255,255,255,0.1); border: 2px solid transparent; border-radius: 25px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .input-p:focus { border-color: var(--p); background: rgba(255,255,255,0.15); box-shadow: 0 0 20px rgba(162,155,254,0.2); }
        
        .p-select { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; max-height: 200px; overflow-y: auto; padding: 10px; }
        .p-opt { padding: 10px 18px; border-radius: 30px; background: rgba(108,92,231,0.1); border: 1px solid rgba(108,92,231,0.3); color: white; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.3s; }
        .p-opt.active { background: var(--p-grad); border-color: transparent; box-shadow: 0 5px 15px rgba(108,92,231,0.4); transform: translateY(-2px); }

        .btn-p { width: 100%; padding: 18px; background: var(--p-grad); color: white; border: none; border-radius: 25px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(108,92,231,0.3); }
        .btn-p:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(108,92,231,0.5); }
        
        .top-nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: transparent; z-index: 50; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(15,5,29,0.7); backdrop-filter: blur(25px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; z-index: 100; }
        .nav-item { color: rgba(255,255,255,0.8); font-size: 0.8rem; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.4s; font-weight: 700; }
        .nav-item.active { color: var(--p); transform: translateY(-8px); }
        .nav-item i { font-size: 1.8rem; margin-bottom: 6px; }
        
        #page-content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .card { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); padding: 25px; border-radius: 35px; margin-bottom: 20px; position: relative; }
        .card h3 { color: var(--p); margin-bottom: 10px; font-weight: 900; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 12px; font-size: 0.7rem; font-weight: 900; margin-bottom: 12px; text-transform: uppercase; background: var(--glass); color: var(--p); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .action-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .action-card i { font-size: 2.2rem; display: block; margin-bottom: 12px; }
        .action-card span { font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }
        .action-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); border-color: var(--p); }
        .action-card.gold { color: var(--gold); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(20px); }
        .modal.active { display: flex !important; }
        .modal-content { background: #1a0b2e; width: 92%; max-width: 450px; padding: 35px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); }
        
        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-200%); background: var(--p-grad); color: white; padding: 18px 35px; border-radius: 25px; font-weight: 900; z-index: 3000; }
        .del-btn { position: absolute; top: 20px; right: 20px; color: var(--red); opacity: 0.5; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }

        .setup-step { display: none; text-align: center; width: 100%; max-width: 400px; padding: 20px; }
        .setup-step.active { display: block; animation: fadeInUp 0.5s ease; }
        .setup-card { background: rgba(255,255,255,0.05); padding: 40px 30px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast" class="toast"><span id="toast-msg"></span></div>

    <!-- LOADING SCREEN -->
    <div id="loading-screen" class="screen active">
        <div class="load-container">
            <div id="l-cube"></div>
            <div id="l-code">&gt;_ init lsdt...</div>
            <div id="l-text">LSDT</div>
        </div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen" style="justify-content:center; align-items:center; background: #05020a;">
        <div id="setup-1" class="setup-step active">
            <div class="setup-card">
                <i class="fas fa-id-card fa-3x" style="color:var(--p); margin-bottom:20px;"></i>
                <h2 style="font-size:1.8rem; margin-bottom:20px;">LSDT Üyesi misiniz?</h2>
                <div style="display:flex; gap:15px;">
                    <button class="btn-p" onclick="app.setupStep(2)">EVET</button>
                    <button class="btn-p" style="background:rgba(255,255,255,0.1);" onclick="app.toast('Adminler ile iletişime geçin!', true)">HAYIR</button>
                </div>
            </div>
        </div>
        <div id="setup-2" class="setup-step"><div class="setup-card"><h2>Bilgileriniz Tam mı?</h2><button class="btn-p" onclick="app.setupStep(3)">ALDIM</button></div></div>
        <div id="setup-3" class="setup-step"><div class="setup-card"><h2>LSDT Sözleşmesi</h2><button class="btn-p" onclick="app.setupStep(4)">SÖZ VERİYORUM</button></div></div>
        <div id="setup-4" class="setup-step"><div class="setup-card"><h2>Hazırsınız!</h2><button class="btn-p" onclick="app.requestNotif()">BAŞLAYALIM</button></div></div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen">
        <div style="height:100%; display:flex; justify-content:center; align-items:center;">
            <div class="glass-card">
                <h1 style="color:white; font-size:3.5rem; font-weight:900; letter-spacing:-3px;">LSDT</h1>
                <p style="color:var(--p); font-weight:800; margin-bottom:40px; text-transform:uppercase;">Luxa Studios Developer Team</p>
                <form onsubmit="app.handleLogin(event)">
                    <input type="text" id="l-user" class="input-p" placeholder="Kullanıcı Adı" required>
                    <input type="password" id="l-pass" class="input-p" placeholder="Şifre" required>
                    <div style="margin-bottom:15px; color:var(--sub); font-size:0.9rem; display:flex; align-items:center; justify-content:center; gap:10px;">
                        <input type="checkbox" id="l-rem" style="width:18px; height:18px; accent-color:var(--p);"> Beni Hatırla
                    </div>
                    <button type="submit" class="btn-p">GİRİŞ YAP <i class="fas fa-arrow-right"></i></button>
                </form>
            </div>
        </div>
    </div>

    <!-- WELCOME SCREEN -->
    <div id="welcome-screen" class="screen" style="z-index: 1500; background: var(--bg); justify-content: center; align-items: center;">
        <div id="w-content" style="text-align: center; transform: scale(0.9); opacity: 0;">
            <div id="w-avatar" style="width:120px; height:120px; background:var(--p-grad); color:white; border-radius:50%; display:flex; justify-content:center; align-items:center; font-weight:900; font-size:4rem; margin: 0 auto 30px;">L</div>
            <h1 id="w-title" style="font-size: 3rem; font-weight: 900; color: white;"></h1>
            <p id="w-sub" style="color: var(--p); font-size: 1.2rem; font-weight: 700; text-transform: uppercase;"></p>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="main-app" class="screen">
        <nav class="top-nav">
            <div style="display:flex; gap:15px; align-items:center;">
                <div id="avatar" style="width:50px; height:50px; background:var(--p-grad); color:white; border-radius:50%; display:flex; justify-content:center; align-items:center; font-weight:900;">L</div>
                <div><div id="u-name" style="font-weight:900; color:var(--p);">Geliştirici</div><div id="u-role" style="font-size:0.75rem; color:var(--sub); font-weight:800;">ADMIN</div></div>
            </div>
            <div onclick="location.reload()" style="color:var(--red); cursor:pointer;"><i class="fas fa-power-off fa-lg"></i></div>
        </nav>
        <main id="page-content"></main>
        <nav class="bottom-nav">
            <div id="nav-dash" class="nav-item active" onclick="app.nav('dash')"><i class="fas fa-home"></i><span>Panel</span></div>
            <div id="nav-tasks" class="nav-item" onclick="app.nav('tasks')"><i class="fas fa-tasks"></i><span>Görevler</span></div>
            <div id="nav-ann" class="nav-item" onclick="app.nav('ann')"><i class="fas fa-bullhorn"></i><span>Duyuru</span></div>
            <div id="nav-set" class="nav-item" onclick="app.nav('set')"><i class="fas fa-user-circle"></i><span>Profil</span></div>
        </nav>
    </div>

    <!-- MODALS -->
    <div id="modal-dev" class="modal"><div class="modal-content">
        <h2 style="margin-bottom:20px;">Üye Ekle</h2>
        <form onsubmit="app.handleNewDev(event)">
            <input type="text" id="d-name" class="input-p" placeholder="Ad Soyad" required>
            <input type="text" id="d-user" class="input-p" placeholder="Kullanıcı Adı" required>
            <input type="password" id="d-pass" class="input-p" placeholder="Şifre" required>
            <div id="d-cat-wrap" class="p-select"></div>
            <button type="submit" class="btn-p">KAYDET</button>
            <button type="button" class="btn-p" style="background:none; margin-top:10px;" onclick="app.close()">VAZGEÇ</button>
        </form>
    </div></div>

    <div id="modal-task" class="modal"><div class="modal-content">
        <h2>Görev Ver</h2>
        <form onsubmit="app.handleNewTask(event)">
            <div id="t-to-wrap" class="p-select"></div>
            <input type="text" id="t-title" class="input-p" placeholder="Başlık" required>
            <textarea id="t-desc" class="input-p" placeholder="Detaylar" style="height:100px;" required></textarea>
            <button type="submit" class="btn-p">GÖNDER</button>
            <button type="button" class="btn-p" style="background:none; margin-top:10px;" onclick="app.close()">VAZGEÇ</button>
        </form>
    </div></div>

    <div id="modal-leave" class="modal"><div class="modal-content">
        <h2 style="color:var(--gold);">İzin Ver</h2>
        <form onsubmit="app.handleNewLeave(event)">
            <div id="l-to-wrap" class="p-select"></div>
            <input type="number" id="l-days" class="input-p" placeholder="Kaç Gün?" required min="1">
            <textarea id="l-reason" class="input-p" placeholder="Sebep" style="height:80px;"></textarea>
            <button type="submit" class="btn-p" style="background:var(--gold-grad);">ONAYLA</button>
            <button type="button" class="btn-p" style="background:none; margin-top:10px;" onclick="app.close()">VAZGEÇ</button>
        </form>
    </div></div>

    <script>
        const RENDER_URL = "https://lsdt.onrender.com";
        const app = {
            db: { users: [], tasks: [], announcements: [] },
            user: null,
            sel: { dCat: 'Script', tTo: '', lTo: '' },

            async init() {
                const tl = gsap.timeline();
                tl.fromTo("#l-cube", { y: -100, opacity: 0 }, { y: 0, opacity: 1, duration: 1, ease: "bounce.out" })
                  .to("#l-code", { opacity: 1, duration: 0.1 }).to("#l-code", { width: "180px", duration: 1, ease: "steps(14)" })
                  .to("#l-text", { opacity: 1, scale: 1, duration: 1, ease: "elastic.out(1, 0.5)" })
                  .to("#loading-screen", { opacity: 0, duration: 0.8, delay: 6.2, onComplete: async () => {
                      await app.sync();
                      const rem = localStorage.getItem('lsdt_rem');
                      if(!localStorage.getItem('lsdt_setup')) app.show('setup-screen');
                      else if(rem) {
                          const u = JSON.parse(rem);
                          const f = (app.db.users || []).find(x => x.username === u.username && x.password === u.password);
                          if(f) app.loginAs(f); else app.show('login-screen');
                      } else app.show('login-screen');
                  }});
                app.renderCats();
                setInterval(() => app.sync(), 15000);
            },

            async sync() {
                try {
                    const r = await fetch(`${RENDER_URL}/api/state`);
                    const d = await r.json();
                    app.db.users = d.users || [];
                    app.db.tasks = d.tasks || [];
                    app.db.announcements = d.announcements || [];
                } catch(e) {}
            },

            show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); },
            open(id) { document.getElementById(id).classList.add('active'); },
            close() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); },
            setupStep(n) { document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active')); document.getElementById('setup-' + n).classList.add('active'); },
            requestNotif() { localStorage.setItem('lsdt_setup', 'true'); app.show('login-screen'); },

            renderCats() {
                const cats = ['Script','Modelleme','GUI Tasarımı','VFX','SFX','Admin','Bug Raporcusu'];
                const w = document.getElementById('d-cat-wrap'); if(!w) return; w.innerHTML = '';
                cats.forEach(c => {
                    const o = document.createElement('div'); o.className = 'p-opt' + (c === app.sel.dCat ? ' active':'');
                    o.innerText = c; o.onclick = () => { app.sel.dCat = c; app.renderCats(); }; w.appendChild(o);
                });
            },

            async handleLogin(e) {
                e.preventDefault();
                const u = document.getElementById('l-user').value, p = document.getElementById('l-pass').value, rem = document.getElementById('l-rem').checked;
                const f = (app.db.users || []).find(x => x.username === u && x.password === p);
                if(f) { if(rem) localStorage.setItem('lsdt_rem', JSON.stringify(f)); app.loginAs(f); } else app.toast('Hatalı!', true);
            },

            loginAs(u) {
                app.user = u;
                document.getElementById('w-avatar').innerText = u.name[0];
                document.getElementById('w-title').innerText = `Hoşgeldin, ${u.name.split(' ')[0]}`;
                document.getElementById('w-sub').innerText = u.category;
                app.show('welcome-screen');
                gsap.fromTo("#w-content", { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 1, ease: "back.out" });
                setTimeout(() => {
                    gsap.to("#welcome-screen", { opacity: 0, duration: 0.8, onComplete: () => {
                        document.getElementById('avatar').innerText = u.name[0];
                        document.getElementById('u-name').innerText = u.name;
                        document.getElementById('u-role').innerText = u.category;
                        app.show('main-app'); app.nav('dash');
                    }});
                }, 3000);
            },

            nav(p) {
                const c = document.getElementById('page-content');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('nav-'+p).classList.add('active');
                if(p === 'dash') {
                    c.innerHTML = `<div class="card" style="background:var(--p-grad);"><h1>Selam, ${app.user.name.split(' ')[0]}</h1><p>${app.user.category}</p></div>
                        ${app.user.role === 'admin' ? `<div class="action-grid">
                            <div class="action-card" onclick="app.open('modal-dev')"><i class="fas fa-user-plus"></i><span>Üye Ekle</span></div>
                            <div class="action-card" onclick="app.openTaskModal()"><i class="fas fa-tasks"></i><span>Görev Ver</span></div>
                            <div class="action-card gold" onclick="app.openLeaveModal()"><i class="fas fa-plane-departure"></i><span>İzin Ver</span></div>
                            <div class="action-card" onclick="app.nav('ann')"><i class="fas fa-bullhorn"></i><span>Duyuru</span></div>
                        </div>` : `<div class="card"><h3>Görevlerin</h3><p>Şu an aktif bir görev bulunamadı.</p></div>`}`;
                } else if(p === 'tasks') {
                    c.innerHTML = `<h2>Görevler</h2>`;
                    (app.db.tasks || []).slice().reverse().forEach(t => {
                        if(app.user.role === 'admin' || t.assignee === app.user.username)
                            c.innerHTML += `<div class="card"><div class="badge">${t.status}</div><h3>${t.title}</h3><p>${t.description}</p>${app.user.role === 'admin' ? `<i class="fas fa-trash del-btn" onclick="app.delTask('${t.id}')"></i>` : ''}</div>`;
                    });
                } else if(p === 'ann') {
                    c.innerHTML = `<h2>Duyurular</h2>${app.user.role === 'admin' ? `<div class="card"><input type="text" id="an-title" class="input-p" placeholder="Başlık"><textarea id="an-text" class="input-p" placeholder="Mesaj"></textarea><button class="btn-p" onclick="app.handleNewAnn()">YAYINLA</button></div>` : ''}`;
                    (app.db.announcements || []).slice().reverse().forEach(a => {
                        c.innerHTML += `<div class="card"><h3>${a.title}</h3><p>${a.text}</p>${app.user.role === 'admin' ? `<i class="fas fa-trash del-btn" onclick="app.delAnn('${a.id}')"></i>` : ''}</div>`;
                    });
                } else if(p === 'set') {
                    c.innerHTML = `<div class="card" style="text-align:center;"><h2>${app.user.name}</h2><p>${app.user.category}</p></div>`;
                    if(app.user.role === 'admin') (app.db.users || []).forEach(u => {
                        if(u.username !== app.user.username) c.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><span>${u.name}</span><i class="fas fa-trash del-btn" style="position:static;" onclick="app.delUser('${u.id}')"></i></div>`;
                    });
                }
            },

            openTaskModal() {
                const w = document.getElementById('t-to-wrap'); if(!w) return; w.innerHTML = '';
                (app.db.users || []).filter(u => u.role === 'dev').forEach(d => {
                    const o = document.createElement('div'); o.className = 'p-opt' + (d.username === app.sel.tTo ? ' active':'');
                    o.innerText = d.name; o.onclick = () => { app.sel.tTo = d.username; app.openTaskModal(); }; w.appendChild(o);
                }); app.open('modal-task');
            },

            openLeaveModal() {
                const w = document.getElementById('l-to-wrap'); if(!w) return; w.innerHTML = '';
                (app.db.users || []).filter(u => u.role === 'dev').forEach(d => {
                    const o = document.createElement('div'); o.className = 'p-opt' + (d.username === app.sel.lTo ? ' active':'');
                    o.innerText = d.name; o.onclick = () => { app.sel.lTo = d.username; app.openLeaveModal(); }; w.appendChild(o);
                }); app.open('modal-leave');
            },

            async handleNewDev(e) {
                e.preventDefault();
                const newUser = {id: Date.now().toString(), name:document.getElementById('d-name').value, username:document.getElementById('d-user').value, password:document.getElementById('d-pass').value, role:app.sel.dCat === 'Admin' ? 'admin' : 'dev', category:app.sel.dCat};
                const r = await fetch(`${RENDER_URL}/api/users`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(newUser)});
                if(r.ok) { app.toast('Üye Eklendi'); app.close(); await app.sync(); app.nav('set'); } else app.toast('Hata Oluştu!', true);
            },

            async handleNewTask(e) {
                e.preventDefault(); if(!app.sel.tTo) return app.toast('Seçim Yap!', true);
                const nt = {id: Date.now().toString(), assignee:app.sel.tTo, title:document.getElementById('t-title').value, description:document.getElementById('t-desc').value, status:'Aktif'};
                await fetch(`${RENDER_URL}/api/tasks`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(nt)});
                app.toast('Görev Verildi'); app.close(); await app.sync(); app.nav('tasks');
            },

            async handleNewAnn() {
                const na = {id: Date.now().toString(), title:document.getElementById('an-title').value, text:document.getElementById('an-text').value};
                await fetch(`${RENDER_URL}/api/announcements`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(na)});
                app.toast('Yayınlandı'); await app.sync(); app.nav('ann');
            },

            async handleNewLeave(e) {
                e.preventDefault(); if(!app.sel.lTo) return app.toast('Seçim Yap!', true);
                const nl = {id: 'L'+Date.now(), assignee:app.sel.lTo, title:'İZİN', description:document.getElementById('l-reason').value, status:'İzinde'};
                await fetch(`${RENDER_URL}/api/tasks`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(nl)});
                app.toast('İzin Verildi'); app.close(); await app.sync(); app.nav('dash');
            },

            async delTask(id) { if(confirm('Sil?')) { await fetch(`${RENDER_URL}/api/tasks/${id}`, {method:'DELETE'}); await app.sync(); app.nav('tasks'); } },
            async delAnn(id) { if(confirm('Sil?')) { await fetch(`${RENDER_URL}/api/announcements/${id}`, {method:'DELETE'}); await app.sync(); app.nav('ann'); } },
            async delUser(id) { if(confirm('Sil?')) { await fetch(`${RENDER_URL}/api/users/${id}`, {method:'DELETE'}); await app.sync(); app.nav('set'); } },

            toast(m, bad=false) {
                const el = document.getElementById('toast'); el.querySelector('span') || (el.innerHTML = `<span></span>`);
                el.querySelector('span').innerText = m; el.style.background = bad ? 'var(--red)' : 'var(--p-grad)';
                gsap.fromTo(el, {y:-100, opacity:0}, {y:0, opacity:1, duration:0.5});
                setTimeout(() => gsap.to(el, {y:-100, opacity:0}), 3000);
            }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
