name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Capacitor & Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Setup iOS Project
        run: |
          rm -rf ios
          npx cap add ios
          npx cap copy ios
          npx cap sync ios

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_ALLOWED="NO"

      - name: Package IPA
        run: |
          cd ios/App/build/Build/Products/Debug-iphoneos
          mkdir Payload
          cp -r App.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: ios/App/build/Build/Products/Debug-iphoneos/app-unsigned.ipa
