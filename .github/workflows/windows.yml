name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Prepare package.json for Electron Builder
        shell: node {0}
        run: |
          const fs = require('fs');
          const pkg = {
            name: "lsdt-app",
            version: "1.0.0",
            description: "LSDT Management App by Luxa Studios",
            author: "Luxa Studios",
            main: "electron-main.js",
            scripts: {
              start: "electron .",
              build: "node -e \"const fs = require('fs'); if (!fs.existsSync('www')) fs.mkdirSync('www'); ['index.html', 'main.js', 'manifest.json'].forEach(f => { if(fs.existsSync(f)) fs.copyFileSync(f, 'www/' + f) });\""
            },
            build: {
              appId: "com.luxastudios.lsdt",
              productName: "LSDT",
              win: {
                target: "nsis",
                icon: "www/icon.png"
              },
              directories: {
                output: "build_output"
              },
              files: [
                "electron-main.js",
                "www/**/*"
              ]
            },
            devDependencies: {
              "electron": "^27.0.0",
              "electron-builder": "^24.0.0"
            }
          };
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('package.json prepared!');

      - name: Install Electron Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Build Windows EXE
        run: npx electron-builder --win --publish never

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: LSDT-Windows-EXE
          path: build_output/*.exe
